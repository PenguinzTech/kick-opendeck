<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <rect width="72" height="72" rx="8" fill="#1a1a2e"/>
  <!-- Clock circle (green = active) -->
  <circle cx="36" cy="34" r="18" fill="none" stroke="#53fc18" stroke-width="2.5"/>
  <!-- Clock hands -->
  <line x1="36" y1="34" x2="36" y2="20" stroke="#53fc18" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="36" y1="34" x2="46" y2="40" stroke="#53fc18" stroke-width="2.5" stroke-linecap="round"/>
  <text x="36" y="64" font-size="10" fill="#53fc18" text-anchor="middle" font-family="Arial" font-weight="bold">SLOW ON</text>
</svg>