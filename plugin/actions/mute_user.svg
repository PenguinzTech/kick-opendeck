<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <rect width="72" height="72" rx="8" fill="#1a1a2e"/>
  <!-- Person head -->
  <circle cx="24" cy="18" r="7" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <!-- Person body (left side, making room for mic) -->
  <path d="M 10 48 Q 10 34 24 34 Q 38 34 38 48" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Microphone body -->
  <rect x="50" y="16" width="10" height="18" rx="5" fill="none" stroke="#53fc18" stroke-width="2.5"/>
  <!-- Mic stand arc -->
  <path d="M 46 28 Q 46 36 55 36 Q 64 36 64 28" fill="none" stroke="#53fc18" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Mic stand line -->
  <line x1="55" y1="36" x2="55" y2="44" stroke="#53fc18" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cross-out slash (red) -->
  <line x1="44" y1="12" x2="66" y2="48" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
</svg>