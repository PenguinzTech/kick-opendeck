<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <rect width="72" height="72" rx="8" fill="#1a1a2e"/>
  <!-- Clock circle -->
  <circle cx="36" cy="34" r="18" fill="none" stroke="#666666" stroke-width="2.5"/>
  <!-- Clock hands showing slow (pointing left/slow) -->
  <line x1="36" y1="34" x2="36" y2="20" stroke="#666666" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="36" y1="34" x2="46" y2="40" stroke="#666666" stroke-width="2.5" stroke-linecap="round"/>
  <!-- ZZZ = off -->
  <text x="36" y="64" font-size="10" fill="#666666" text-anchor="middle" font-family="Arial" font-weight="bold">SLOW OFF</text>
</svg>